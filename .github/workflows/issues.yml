name: "Metadata Validation"

on:
  issues:
    types: [opened, labeled]

jobs:
  sync_issue:
    if: contains(github.event.issue.labels.*.name, 'Scm-app')
    runs-on: ubuntu-latest
    steps:
      - name: Process Issue Data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_SYNC_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: 'schoolmore',
              repo: 'scm-app',
              title: `[SCM-APP-ISSUES] ${context.payload.issue.title}`,
              body: `Issue originale par @${context.payload.issue.user.login}\n\n---\n\n${context.payload.issue.body}\n\nLien original : ${context.payload.issue.html_url}`,
              labels: ['external-sync', 'scm-app']
            });
